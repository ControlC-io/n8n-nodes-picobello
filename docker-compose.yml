services:
  n8n:
    image: n8nio/n8n
    ports:
      - '5680:5678'
    environment:
      - N8N_CUSTOM_EXTENSIONS=/custom
      - N8N_EDITOR_BASE_URL=http://127.0.0.1:5680/
      - WEBHOOK_URL=http://127.0.0.1:5680/
      - GENERIC_TIMEZONE=Europe/Madrid
    volumes:
      - n8n_data:/home/node/.n8n
      - ./package.json:/custom/package.json:ro
      - ./dist:/custom/dist:ro

volumes:
  n8n_data:
